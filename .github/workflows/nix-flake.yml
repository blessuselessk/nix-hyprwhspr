name: Nix flake

# Builds the flake's package (and everything it pulls in - pywhispercpp built
# from source, the onnx-asr/GTK4 python env, etc.) so a broken derivation or a
# Nix-incompatible edit to bin/hyprwhspr / lib/src/backend_installer.py /
# lib/src/cli_commands.py gets caught in CI instead of on someone's machine.

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'bin/**'
      - 'lib/**'
      - 'share/**'
      - 'config/**'
      - 'requirements*.txt'
      - '.github/workflows/nix-flake.yml'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'nix/**'
      - 'bin/**'
      - 'lib/**'
      - 'share/**'
      - 'config/**'
      - 'requirements*.txt'
      - '.github/workflows/nix-flake.yml'
  workflow_dispatch: {}

concurrency:
  group: nix-flake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & smoke-test (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Speed up rebuilds with the Determinate/Nix community cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake metadata (no build)
        run: nix flake check --no-build --show-trace

      - name: Build default package
        run: nix build .#default -L --print-out-paths

      - name: Smoke-test the built CLI
        run: |
          ./result/bin/hyprwhspr --version
          ./result/bin/hyprwhspr --help
          ./result/bin/hyprwhspr validate || true
          # Real end-to-end check that the GTK4/gtk4-layer-shell wiring
          # (GI_TYPELIB_PATH/LD_LIBRARY_PATH set by wrapProgram) actually
          # works, via the same code path `hyprwhspr setup` uses.
          ./result/bin/hyprwhspr mic-osd status | tee /tmp/mic-osd-status.txt
          grep -q "Dependencies available: Yes" /tmp/mic-osd-status.txt

      - name: Confirm local/cloud backends import
        run: |
          py="$(nix build .#pythonEnv --no-link --print-out-paths)/bin/python3"
          "$py" -c "
          import pywhispercpp, onnx_asr, elevenlabs, sounddevice, evdev, websocket, dbus
          print('all bundled backends import cleanly')
          "

      - name: Build dev shell
        run: nix develop .#default --command true
